name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@728c6c6b8cf02c2e48117716a91ee48313958a19 # v2
        with:
          php-version: '8.3'
          coverage: pcov

      - name: Pin Laravel and Testbench versions
        run: |
          composer require "laravel/framework:^12.0" --no-update --no-interaction
          composer require "orchestra/testbench:^10" --dev --no-update --no-interaction

      - name: Install dependencies
        run: composer update --no-progress --prefer-dist --no-interaction

      - name: Create reports directory
        run: mkdir -p tests/_reports

      - name: Run tests with coverage
        run: vendor/bin/pest --coverage --log-junit tests/_reports/junit.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
