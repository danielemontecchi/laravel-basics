name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pest-tests:
    name: Pest (PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: [11, 12, 13]
        exclude:
          - php: 8.2
            laravel: 13
          - php: 8.3
            laravel: 11
          - php: 8.4
            laravel: 11
          - php: 8.4
            laravel: 12
        include:
          - laravel: 11
            testbench: "^9"
          - laravel: 12
            testbench: "^10"
          - laravel: 13
            testbench: "^11"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Pin Laravel and Testbench versions
        run: |
          composer require "laravel/framework:^${{ matrix.laravel }}" --no-update --no-interaction
          composer require "orchestra/testbench:${{ matrix.testbench }}" --dev --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Run Pest
        run: vendor/bin/pest
